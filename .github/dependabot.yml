# Weekly Dependabot updates, each grouped into a single low-noise PR:
#   - github-actions: keep the SHA-pinned actions fresh (pins otherwise go stale + miss security fixes)
#   - uv:             the Python deps (pyproject.toml + uv.lock)
#   - npm:            the coordinator's Node deps (coordinator/package.json + package-lock.json)
#   - docker:         the coordinator image's base (coordinator/Dockerfile — the node:*-bookworm-slim pin)
# Every resulting PR is gated by the full suite via .github/workflows/dependabot-ci.yml before it merges.
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]      # one combined PR for all action bumps

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]      # one combined PR for all Python dep bumps

  - package-ecosystem: npm
    directory: /coordinator   # where package.json + package-lock.json live
    schedule:
      interval: weekly
    groups:
      coordinator:
        patterns: ["*"]      # one combined PR for all Node dep bumps
    ignore:
      # Next.js 16's build-time TypeScript detection does not recognize the platform-split
      # TypeScript 7 package yet. Keep patch/minor updates flowing on the supported line, but do
      # not let a major compiler bump poison the otherwise-safe coordinator update group.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /coordinator   # the multi-stage Dockerfile's base image
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]      # one combined PR for base-image bumps
