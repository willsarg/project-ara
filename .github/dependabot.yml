# Keeps the SHA-pinned GitHub Actions fresh (the one downside of pinning: pins go stale and miss
# upstream security fixes). Dependabot opens a weekly PR bumping the pins — grouped into one PR to
# stay low-noise. https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]      # one combined PR for all action bumps
