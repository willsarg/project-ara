# The test suite, run on all three OSes — primarily to catch POSIX/path/filesystem differences
# (the project has Windows-specific code paths). Runs the mocked unit suite + 100% coverage gate
# (both baked into the default `pytest` in pyproject.toml). Integration tests (`-m integration`) are
# hardware-gated and stay manual on the real boxes.
#
# Two entry points:
#   - workflow_call: the release pipeline (publish.yml) calls this so a v* tag is gated on tests.
#   - workflow_dispatch: run it by hand from the Actions tab for on-demand cross-platform feedback.
#
# Hardening: read-only token, actions pinned to commit SHAs, checkout creds not persisted, locked
# deps, per-job timeout. Four loadfile workers keep each OS bounded while avoiding needless serial
# execution; the run steps remain portable between bash (Linux/macOS) and PowerShell (Windows).
name: Shared · Test Suite (cross-OS)

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false           # show every OS's result, not just the first failure
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0          # hatch-vcs derives the version from git tags during `uv sync` —
                                  # a shallow clone has no tags and the editable install would fail
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --group dev
      - run: uv run pytest -n 4 --dist=loadfile --durations=25
        # Unit suite + 100% coverage gate. Durations make future regressions visible in the log.
