# Publish project-ara to PyPI via Trusted Publishing (OIDC) — no API token stored.
# Fires when a version tag (v*) is pushed. The PyPI side is a "trusted publisher" registered at
# https://pypi.org/manage/account/publishing/ bound to: owner willsarg, repo project-ara,
# workflow publish.yml, environment pypi. See https://docs.pypi.org/trusted-publishers/.
#
# NOTE: the package version is derived from this git tag by hatch-vcs (no hardcoded version). The
# build step below asserts the built artifacts carry exactly the tag's version before publishing.
#
# Security hardening: deny-all token by default (each job opts into the minimum), actions pinned to
# full commit SHAs (mutable tags are a supply-chain risk), checkout credentials not persisted,
# id-token:write scoped to the publish job alone, environment binding, per-job timeouts.
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions: {}            # deny-all at the top; each job opts into only what it needs

jobs:
  # Tests gate the release (test → build → publish): a v* tag runs the cross-OS suite first via the
  # shared test.yml, and build/publish only proceed if every OS passes.
  test:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  build:
    needs: test            # no build unless tests pass on all OSes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read       # checkout only
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0          # hatch-vcs derives the version from the tag — needs full history
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build                       # version comes from the git tag via hatch-vcs
      - name: Verify built version matches the tag
        env:
          TAG: ${{ github.ref_name }}          # e.g. v0.0.5 — via env, never inlined into the script
        run: |
          want="${TAG#v}"                      # strip the leading v
          echo "tag=$TAG -> want version $want"; ls -1 dist/
          # A clean tag version is built only on an exact, clean tagged commit; a dev/local suffix
          # here means the tag wasn't seen (shallow clone) or the tree was dirty — fail loud.
          if [ ! -f "dist/project_ara-$want.tar.gz" ]; then
            echo "::error::built artifacts are not version $want (see dist/ above) — hatch-vcs did not resolve the tag cleanly."
            exit 1
          fi
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi      # bind to the GitHub Environment the PyPI publisher trusts
    permissions:
      id-token: write      # OIDC token for Trusted Publishing — the ONLY elevated scope
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
