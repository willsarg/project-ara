# Post-merge CI for main. Human pull requests are deliberately verified locally instead of spending
# GitHub-hosted runner capacity on every revision; Dependabot keeps its dedicated PR gate. The
# Python job reuses the exact release gate while the coordinator validates in parallel.
name: Gate · Main

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    uses: ./.github/workflows/test.yml

  coordinator:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: coordinator
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"    # matches the Dockerfile base (node:26-bookworm-slim)
          cache: npm
          cache-dependency-path: coordinator/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
        env:
          ARA_COORDINATOR_SECRET: ci-build-placeholder
