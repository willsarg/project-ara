# PR + main-push gate. Every pull request (including Dependabot's uv/npm/docker/actions bumps) must
# pass BOTH suites before it can merge — so a dependency update is verified in the cloud, not by a
# pull-to-local-and-test. The two suites are independent:
#   - python:      reuses workflows/test.yml (the 3-OS matrix + 100% coverage gate, engine-free).
#   - coordinator: the Next.js control plane — types, unit tests, and an edge-runtime build check
#                  (the build step is what surfaces Node-API-in-Edge-Runtime problems).
#
# Hardening mirrors test.yml: read-only token, actions pinned to commit SHAs, checkout creds not
# persisted, locked installs (`uv sync --frozen`, `npm ci`), per-job timeout.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # The Python core, cross-OS. Delegated to the reusable workflow so release gating (publish.yml)
  # and PR gating run the exact same suite.
  python:
    uses: ./.github/workflows/test.yml

  coordinator:
    runs-on: ubuntu-latest      # the coordinator ships as a Linux container; Linux is the real target
    timeout-minutes: 15
    defaults:
      run:
        working-directory: coordinator
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"    # matches the Dockerfile base (node:22-bookworm-slim)
          cache: npm
          cache-dependency-path: coordinator/package-lock.json
      - run: npm ci              # locked install from package-lock.json
      - run: npx tsc --noEmit    # type gate
      - run: npm test            # vitest run
      - run: npm run build       # next build — compiles the edge middleware; catches Node-API-in-Edge issues
        env:
          # instrumentation.ts fails closed without a secret at *runtime*; build only needs it present.
          ARA_COORDINATOR_SECRET: ci-build-placeholder
