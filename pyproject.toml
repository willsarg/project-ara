[project]
name = "project-ara"
version = "0.0.1"
description = "AI Runs Anywhere — backend-agnostic local inference that fits any hardware safely."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Will Sarg" }]
requires-python = ">=3.12"
dependencies = [
    # cross-platform system recon for `ara detect` (read-only; runs on any box)
    "psutil>=5.9",
    # model acquisition — snapshot_download + cache layout; no auth needed for ungated models
    "huggingface_hub>=0.23",
    # core is otherwise pure-python; the Apple engine auto-installs ONLY on Apple Silicon
    "wmx-suite ; sys_platform == 'darwin' and platform_machine == 'arm64'",
]

[project.optional-dependencies]
# The MLX engine is Apple-Silicon only; mark it so a non-Apple `uv sync --extra
# apple` resolves cleanly (skips it) instead of failing on an unsatisfiable dep.
apple = ["wmx-suite ; sys_platform == 'darwin' and platform_machine == 'arm64'"]
# cuda = [...]                        # added when the CUDA backend lands

[project.scripts]
ara = "ara.cli:main"

[tool.uv.sources]
# solo-dev default: use the sibling checkout, editable. Swap to a git URL
# ({ git = "https://github.com/willsarg/wmx-suite" }) for clone-and-go.
# Marked Apple-only so the path is never resolved on non-Apple hosts (the sibling
# won't exist there) — clone-and-go `uv sync` on Windows/Linux skips it entirely.
wmx-suite = { path = "../wmx-suite", editable = true, marker = "sys_platform == 'darwin' and platform_machine == 'arm64'" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ara"]

# Test/dev tooling. The suite runs WITHOUT wmx-suite on purpose — it proves the
# core stays engine-free — so it never needs the (Apple-only, path-sourced) engine.
[dependency-groups]
dev = ["pytest>=8", "pytest-cov>=5", "mutmut>=3"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --cov=ara --cov-report=term-missing"

[tool.coverage.run]
source = ["ara"]
branch = true

[tool.coverage.report]
show_missing = true
# Full statement + branch coverage is the standing bar — new code lands with tests.
fail_under = 100
# The lazy `from wmx_suite import ...` lines inside apple.py only execute when a real
# engine is present; the seam's behavior is covered via a fake wmx_suite instead.
exclude_also = ["if TYPE_CHECKING:"]

[tool.mutmut]
source_paths = ["ara"]
# Clear the project's addopts so --cov / fail_under=100 don't make every mutant
# run exit non-zero (which would corrupt kill/survive detection).
pytest_add_cli_args = ["-o", "addopts=", "-p", "no:cacheprovider"]
also_copy = ["tests", "pyproject.toml", "uv.lock"]
